# ╔══════════════════════════════════════════════════════════════╗
# ║  Hyprland Config — migrated from komorebi + whkdrc         ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Monitors ──────────────────────────────────────────────────
# Adjust connector names (run `hyprctl monitors` to identify)
monitor = DP-1, preferred, 0x0, 1      # Main — BSP
monitor = DP-2, preferred, auto, 1     # Secondary
# monitor = , preferred, auto, 1       # fallback for any monitor

# ── Autostart ─────────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper                   # wallpaper daemon (configure ~/.config/hypr/hyprpaper.conf)
exec-once = dunst                       # notification daemon
exec-once = /usr/lib/polkit-kde-authentication-agent-1  # polkit agent
exec-once = wl-paste --type text --watch cliphist store  # clipboard manager
exec-once = wl-paste --type image --watch cliphist store

# ── General ───────────────────────────────────────────────────
general {
    gaps_in = 4                         # was: container_padding 4
    gaps_out = 4                        # was: workspace_padding 4
    border_size = 0                     # was: border false
    col.active_border = rgba(89b4faee) rgba(b4befee) 45deg
    col.inactive_border = rgba(585b7066)
    layout = dwindle                    # BSP equivalent
    allow_tearing = false
}

# ── Decoration ────────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a2eee)
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
}

# ── Animations ────────────────────────────────────────────────
# was: 170ms EaseOutQuad
animations {
    enabled = true

    bezier = easeOutQuad, 0.25, 0.46, 0.45, 0.94

    animation = windows, 1, 3, easeOutQuad
    animation = windowsOut, 1, 3, easeOutQuad, popin 80%
    animation = border, 1, 4, easeOutQuad
    animation = borderangle, 1, 4, easeOutQuad
    animation = fade, 1, 3, easeOutQuad
    animation = workspaces, 1, 3, easeOutQuad
}

# ── Input ─────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ── Layouts ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2                     # always split to the right/bottom (BSP-like)
}

master {
    new_status = master
}

# ── Misc ──────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Window Rules ──────────────────────────────────────────────
# Float dialogs and utility windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# ── Keybindings ───────────────────────────────────────────────
# Mod key = ALT (matching your komorebi setup)
$mod = ALT

# App launchers
bind = $mod, Return, exec, wezterm     # terminal
bind = $mod SHIFT, Return, exec, wezterm  # promote equivalent — just launch new
bind = $mod, Space, exec, wofi --show drun  # app launcher (install wofi or rofi-wayland)
bind = $mod, E, exec, thunar            # file manager

# Window management
bind = $mod, Q, killactive              # was: komorebic close
bind = $mod, M, movetoworkspacesilent, special:minimized  # minimize to special workspace
bind = $mod, T, togglefloating          # was: toggle-float
bind = $mod SHIFT, F, fullscreen, 1     # was: toggle-monocle (maximise without hiding bar)
bind = $mod, F, fullscreen, 0           # actual fullscreen
bind = $mod SHIFT, R, exec, hyprctl reload  # was: retile / reload

# Focus windows (vim-style) — was: komorebic focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Cycle focus — was: cycle-focus
bind = $mod SHIFT, bracketleft, cyclenext, prev
bind = $mod SHIFT, bracketright, cyclenext

# Move windows — was: komorebic move
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize windows — was: resize-axis
binde = $mod, equal, resizeactive, 40 0
binde = $mod, minus, resizeactive, -40 0
binde = $mod SHIFT, equal, resizeactive, 0 -40
binde = $mod SHIFT, minus, resizeactive, 0 40

# Layout flips — was: flip-layout
bind = $mod, X, togglesplit             # dwindle: toggle split direction
bind = $mod, Y, pseudo                  # pseudo-tiling

# Grouped (stacked) windows — was: komorebic stack
bind = $mod, Left, togglegroup
bind = $mod, bracketleft, changegroupactive, b   # was: cycle-stack previous
bind = $mod, bracketright, changegroupactive, f   # was: cycle-stack next

# ── Workspaces ────────────────────────────────────────────────
# 7 workspaces per monitor (matching your komorebi setup)
# Focus workspace — was: komorebic focus-workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7

# Move window to workspace — was: komorebic move-to-workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Function Keys ────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot (install grim + slurp)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Clipboard history
bind = $mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
