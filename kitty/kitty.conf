# ╔══════════════════════════════════════════════════════════════╗
# ║  Kitty Config — migrated from wezterm settings              ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Theme ─────────────────────────────────────────────────────
# Install: kitty +kitten themes --reload-in=all Tokyo Night
include current-theme.conf

# ── Font ──────────────────────────────────────────────────────
font_family      0xProto Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# ── Window / Appearance ──────────────────────────────────────
background_opacity 0.85
window_padding_width 0 8 4 8
# top right bottom left (matching wezterm: 0 1cell 0.5cell 1cell)

hide_window_decorations yes
confirm_os_window_close 2
remember_window_size no
initial_window_width  124c
initial_window_height 42c

# ── Scrollback ────────────────────────────────────────────────
scrollback_lines 5000

# ── Tab Bar ───────────────────────────────────────────────────
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_title_template " {index}: {title} "

active_tab_font_style   bold
inactive_tab_font_style normal

# ── Inactive pane dimming (matching wezterm: sat 0.24, bright 0.5) ──
inactive_text_alpha 0.5

# ── Cursor ────────────────────────────────────────────────────
cursor_shape beam
cursor_blink_interval 0

# ── Mouse ─────────────────────────────────────────────────────
url_style curly
open_url_with default
copy_on_select clipboard

# ── Bell ──────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ── Keybindings ───────────────────────────────────────────────
# Hyper key = ctrl+alt+shift (CapsLock via keyd)

# Tabs
map ctrl+alt+shift+t     new_tab_with_cwd
map ctrl+alt+shift+w     close_tab
map ctrl+alt+shift+n     next_tab
map ctrl+alt+shift+p     previous_tab
map ctrl+alt+shift+tab   next_tab
map ctrl+alt+shift+1     goto_tab 1
map ctrl+alt+shift+2     goto_tab 2
map ctrl+alt+shift+3     goto_tab 3
map ctrl+alt+shift+4     goto_tab 4
map ctrl+alt+shift+5     goto_tab 5
map ctrl+alt+shift+6     goto_tab 6
map ctrl+alt+shift+7     goto_tab 7
map ctrl+alt+shift+8     goto_tab 8
map ctrl+alt+shift+9     goto_tab 9
map ctrl+alt+shift+[     move_tab_backward
map ctrl+alt+shift+]     move_tab_forward
map ctrl+alt+shift+r     set_tab_title

# Splits / Panes (kitty calls them "windows" within a tab)
map ctrl+alt+shift+d     launch --cwd=current --location=vsplit
map ctrl+alt+shift+s     launch --cwd=current --location=hsplit
map ctrl+alt+shift+x     close_window
map ctrl+alt+shift+z     toggle_layout stack

# Navigate panes (vim-style)
map ctrl+alt+shift+h     neighboring_window left
map ctrl+alt+shift+j     neighboring_window down
map ctrl+alt+shift+k     neighboring_window up
map ctrl+alt+shift+l     neighboring_window right

# Resize panes
map ctrl+alt+shift+left  resize_window narrower 3
map ctrl+alt+shift+right resize_window wider 3
map ctrl+alt+shift+up    resize_window taller 3
map ctrl+alt+shift+down  resize_window shorter 3

# Scrollback & search
map ctrl+alt+shift+f         show_scrollback
map ctrl+alt+shift+backspace clear_terminal scrollback active

# Copy/Paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font size
map ctrl+equal   change_font_size all +1.0
map ctrl+minus   change_font_size all -1.0
map ctrl+0       change_font_size all 0

# Scroll
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# ── Layouts ───────────────────────────────────────────────────
enabled_layouts splits,stack
